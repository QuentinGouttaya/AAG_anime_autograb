services:
  redis:
    image: redis:8.8-alpine
    container_name: aag-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aag-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      PREMIUMIZE_API_KEY: ${PREMIUMIZE_API_KEY}
    env_file:
      - ./apps/api/.env

volumes:
  redis-data:
